<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Alert</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* ⚠️ WARNING */
#warning {
  position: fixed;
  top: 30%;
  width: 100%;
  text-align: center;
  font-size: 35px;
  color: red;
  font-weight: bold;
  text-shadow: 0 0 15px red, 0 0 30px red;
  animation: fade 1s infinite;
  z-index: 10;
}

@keyframes fade {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* LOG AREA */
#log {
  padding: 20px;
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
}

/* RED FLASH BG */
body.flash {
  animation: flash 0.8s infinite;
}

@keyframes flash {
  0% { background: black; }
  50% { background: #200000; }
  100% { background: black; }
}
</style>
</head>

<body>

<div id="warning">⚠️ SECURITY BREACH DETECTED ⚠️</div>
<div id="log"></div>

<!-- 🔊 Beep / music file -->
<audio id="beep" src="beep.mp3" loop></audio>

<script>
let log = document.getElementById("log");
let beep = document.getElementById("beep");

let msgs = [
  "Connecting to remote server...",
  "Bypassing firewall...",
  "Decrypting data...",
  "Accessing gallery...",
  "Uploading files...",
  "Camera access granted...",
  "Microphone enabled...",
  "Tracking location...",
  "Injecting malware...",
  "System override active...",
  "Extracting WhatsApp data...",
  "Cloning contacts...",
  "Uploading to dark server...",
  "Full device control enabled..."
];

// 👉 START AUTOMATICALLY
start();

function start() {

  // 🔊 beep
  beep.play();

  // 📳 vibration loop
  if (navigator.vibrate) {
    setInterval(() => {
      navigator.vibrate([400, 100, 400, 100, 800]);
    }, 1200);
  }

  // 📱 fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // 🔴 background flash
  document.body.classList.add("flash");

  // 📜 FAST LOG SPAM
  setInterval(() => {
    for (let i = 0; i < 3; i++) {
      let m = msgs[Math.floor(Math.random()*msgs.length)];
      log.innerHTML += "> " + m + "<br>";
    }
    log.scrollTop = log.scrollHeight;
  }, 200);

  // 🔙 back trap
  history.pushState(null, null, location.href);
  window.onpopstate = function () {
    history.pushState(null, null, location.href);
  };
}

// 😈 SECRET EXIT (8 taps)
let taps = 0;
document.body.onclick = () => {
  taps++;
  if (taps >= 8) {
    window.location.href = "about:blank";
  }
};
</script>

</body>
</html>
